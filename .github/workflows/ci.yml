name: CI
on: [push]
jobs:
  tests:
    name: "Farm-Tokenization"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v3
      - name: "Setup Node.js"
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      - name: "Install dependencies"
        run: npm ci
      - name: "Run tests"
        run: npm test
